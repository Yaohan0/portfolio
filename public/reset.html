<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Reset Password — Yaohan</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #090909;
        color: #f3efe4;
        font-family: system-ui, sans-serif;
      }

      .card {
        width: min(92vw, 520px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 24px;
        background: #111111;
        padding: 32px;
      }

      h1 {
        margin: 0 0 12px;
      }

      p {
        color: #a9a196;
        line-height: 1.7;
      }

      button {
        margin-top: 20px;
        border: 0;
        border-radius: 999px;
        background: #c9ff5f;
        color: #090909;
        padding: 12px 18px;
        font-weight: 800;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Reset password</h1>
      <p>
        If the popup does not open automatically, click the button below.
      </p>

      <button onclick="window.netlifyIdentity && window.netlifyIdentity.open()">
        Open reset popup
      </button>
    </div>

    <script>
      window.addEventListener("load", function () {
        if (!window.netlifyIdentity) return;

        window.netlifyIdentity.on("init", function () {
          window.netlifyIdentity.open();
        });

        window.netlifyIdentity.on("login", function () {
          window.location.href = "/admin/";
        });

        window.netlifyIdentity.init();
      });
    </script>
  </body>
</html>
